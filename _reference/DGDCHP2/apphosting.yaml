# Firebase App Hosting runtime configuration
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 1024
  maxInstances: 5
  minInstances: 0
  concurrency: 80
  timeoutSeconds: 300

env:
  - variable: ANTHROPIC_MODEL
    value: claude-opus-4-7
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_PROJECT_ID
    value: dgdchp2
    availability:
      - BUILD
      - RUNTIME

  # The actual API key is stored in Google Secret Manager.
  # Create it once with:
  #   firebase apphosting:secrets:set ANTHROPIC_API_KEY
  # or:
  #   printf 'sk-ant-...' | gcloud secrets create ANTHROPIC_API_KEY \
  #     --replication-policy=automatic --data-file=- --project=dgdchp2
  # then grant the backend access:
  #   firebase apphosting:secrets:grantaccess ANTHROPIC_API_KEY --backend dgdchp2
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
    availability:
      - RUNTIME
