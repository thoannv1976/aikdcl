# Firebase App Hosting runtime config cho aikdcl
# Project Firebase: aikdcl  Region: asia-southeast1
# Backend ID:       aikdcl
#
# Quy tắc UAE18:
#   - Mọi credential dùng `secret:` (Google Secret Manager).
#   - Chỉ config public (project ID, model, region) dùng `value:`.
#   - Tạo secret xong nhớ grantaccess cho backend, nếu không container start fail.

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10
  concurrency: 40
  # Cap ngay dưới hard limit 540s của App Hosting / Cloud Run. SDK Anthropic
  # 240s (lib/claude.ts) đảm bảo còn headroom cho retries.
  timeoutSeconds: 540

env:
  # ---------- public config ----------
  - variable: ANTHROPIC_MODEL
    value: claude-sonnet-4-6
    availability: [BUILD, RUNTIME]

  - variable: FIREBASE_PROJECT_ID
    value: 'aikdcl'
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: 'aikdcl'
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: 'aikdcl.firebaseapp.com'
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: 'aikdcl.firebasestorage.app'
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_APP_NAME
    value: 'AIKDCL'
    availability: [BUILD, RUNTIME]

  # ---------- secrets ----------
  # Tạo:
  #   firebase apphosting:secrets:set ANTHROPIC_API_KEY
  #   firebase apphosting:secrets:grantaccess ANTHROPIC_API_KEY --backend [ten-backend]
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
    availability: [RUNTIME]

  - variable: FIREBASE_SERVICE_ACCOUNT_JSON
    secret: FIREBASE_SERVICE_ACCOUNT_JSON
    availability: [RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability: [BUILD, RUNTIME]

  - variable: NEXT_PUBLIC_FIREBASE_APPCHECK_SITE_KEY
    secret: NEXT_PUBLIC_FIREBASE_APPCHECK_SITE_KEY
    availability: [BUILD, RUNTIME]
